name: Update Market Data

on:
  schedule:
    # Run at 22:00 UTC Mon-Fri (after US market close)
    - cron: '0 22 * * 1-5'
  workflow_dispatch: # Allow manual trigger

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install yfinance

      - name: Fetch market data
        run: python fetch_data.py

      - name: Update inline data in HTML
        run: python update_inline.py

      - name: Commit and push
        env:
          COMMIT_DATE: ${{ github.run_id }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add market_data.json index.html
          DATE_STR=$(date -u +%Y-%m-%d)
          git diff --cached --quiet || git commit -m "data: update market data ${DATE_STR}"
          git push
