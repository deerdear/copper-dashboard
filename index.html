<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cu - Copper Investment Analyzer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FAF7F2;--bg2:#F2EDE5;--bg3:#E8E0D4;
  --s:#fff;--s2:#FDFCFA;
  --bd:#DDD5C8;--bd2:#C8BDA8;
  --t:#2C2416;--td:#7A6E5D;--tl:#A89B87;
  --cu:#B87333;--cu2:#CD7F32;--cul:#E8C9A0;--cud:#8B5E3C;
  --g:#2D7A4F;--gd:#E8F5EE;--gl:#3DA66A;
  --r:#B83A2E;--rd:#FDEEEC;--rl:#D44E42;
  --y:#A07B1A;--yd:#FBF5E6;
  --b:#3A6EA5;--bd3:#E8F0FA;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--t);line-height:1.6;font-weight:400;
  background-image:url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='.65' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23n)' opacity='.025'/%3E%3C/svg%3E");
}

/* Header */
.hdr{padding:28px 40px 24px;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:16px;
  border-bottom:1px solid var(--bd)}
.hdr h1{font-family:'DM Serif Display',serif;font-size:28px;color:var(--t);font-weight:400;letter-spacing:-0.5px}
.hdr h1 span{color:var(--cu);font-style:italic}
.hdr .sub{color:var(--td);font-size:12px;letter-spacing:0.3px;margin-top:4px}
.hdr .live{display:flex;align-items:baseline;gap:12px}
.hdr .cu-price{font-family:'JetBrains Mono',monospace;font-size:32px;font-weight:600;color:var(--t);letter-spacing:-1px}
.hdr .cu-unit{font-size:11px;color:var(--td);text-transform:uppercase;letter-spacing:1px}
.hdr .cu-change{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500;padding:3px 10px;border-radius:20px}

/* Tabs */
.tabs{display:flex;padding:0 40px;border-bottom:1px solid var(--bd);overflow-x:auto;gap:0;background:var(--s2)}
.tab{padding:14px 20px;cursor:pointer;color:var(--td);font-size:12px;font-weight:500;letter-spacing:0.5px;text-transform:uppercase;
  border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s}
.tab:hover{color:var(--t)}.tab.active{color:var(--cu);border-bottom-color:var(--cu)}

/* Container */
.ctr{max-width:1400px;margin:0 auto;padding:28px 40px}

/* Tables */
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 12px;border-bottom:2px solid var(--bd);color:var(--td);font-weight:500;font-size:10px;
  text-transform:uppercase;letter-spacing:0.8px;cursor:pointer;white-space:nowrap}
th:hover{color:var(--t)}
td{padding:10px 12px;border-bottom:1px solid var(--bg2);vertical-align:top}
tr:hover td{background:var(--bg2)}

/* Badges */
.b{display:inline-block;padding:2px 9px;border-radius:3px;font-size:10px;font-weight:600;letter-spacing:0.3px;text-transform:uppercase}
.bg{background:var(--gd);color:var(--g)}.br{background:var(--rd);color:var(--r)}.by{background:var(--yd);color:var(--y)}.bb{background:var(--bd3);color:var(--b)}

/* KPI Grid */
.kpi-g{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:16px;margin-bottom:28px}
.kpi{background:var(--s);border:1px solid var(--bd);padding:18px 16px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--bd2)}
.kpi .l{font-size:10px;color:var(--td);text-transform:uppercase;letter-spacing:0.8px;font-weight:500}
.kpi .v{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:600;margin-top:6px;letter-spacing:-0.5px}
.kpi .d{font-size:11px;color:var(--tl);margin-top:4px}
.kpi.bu::before{background:var(--g)}.kpi.bu .v{color:var(--g)}
.kpi.be::before{background:var(--r)}.kpi.be .v{color:var(--r)}
.kpi.ne::before{background:var(--y)}.kpi.ne .v{color:var(--y)}
.kpi.ac::before{background:var(--cu)}.kpi.ac .v{color:var(--cu)}

/* Bars */
.bar-c{display:flex;align-items:center;gap:6px}
.bar{height:4px;border-radius:2px;background:var(--bg3);flex:1;overflow:hidden;min-width:60px}
.bar-f{height:100%;border-radius:2px}
.bar-v{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--td);min-width:28px;text-align:right}

/* Sections */
.sect{font-family:'DM Serif Display',serif;font-size:18px;font-weight:400;margin-bottom:16px;padding-bottom:8px;
  border-bottom:1px solid var(--bd);color:var(--t)}
.two{display:grid;grid-template-columns:1fr 1fr;gap:24px}@media(max-width:900px){.two{grid-template-columns:1fr}}

/* Cards / Boxes */
.box{background:var(--s);border:1px solid var(--bd);padding:18px;margin-bottom:14px;transition:border-color .2s}
.box:hover{border-color:var(--bd2)}
.box h4{color:var(--cud);margin-bottom:8px;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.box p{font-size:13px;color:var(--td);line-height:1.7}

/* Scenario buttons */
.sc-btn{padding:10px 18px;border:1px solid var(--bd);background:var(--s);color:var(--t);cursor:pointer;font-size:12px;
  font-weight:500;transition:all .2s;letter-spacing:0.3px}
.sc-btn:hover{border-color:var(--cu);color:var(--cu)}
.sc-btn.active{background:var(--cu);border-color:var(--cu);color:#fff}

/* P&L colors */
.pnl-p{color:var(--g);font-family:'JetBrains Mono',monospace;font-weight:600}
.pnl-n{color:var(--r);font-family:'JetBrains Mono',monospace;font-weight:600}

/* Timeline */
.tl{position:relative;padding-left:32px}
.tl::before{content:'';position:absolute;left:7px;top:0;bottom:0;width:1px;background:var(--bd)}
.tl-i{position:relative;margin-bottom:16px;background:var(--s);border:1px solid var(--bd);padding:16px 18px}
.tl-i::before{content:'';position:absolute;left:-29px;top:20px;width:8px;height:8px;border-radius:50%;
  border:2px solid var(--cu);background:var(--bg)}
.tl-i.past::before{background:var(--cu)}
.tl-i .dt{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--cu);font-weight:500;margin-bottom:4px;
  display:flex;align-items:center;gap:8px}
.tl-i h4{margin-bottom:4px;font-size:14px;font-weight:500}
.tl-i .imp{font-size:12px;color:var(--td);line-height:1.6}

/* Supply chain */
.chain{background:var(--s);border:1px solid var(--bd);margin-bottom:12px;overflow:hidden}
.chain-h{padding:12px 16px;background:var(--bg2);border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;gap:12px}
.chain-h h4{font-size:13px;font-weight:600;white-space:nowrap}.chain-h .tn{font-size:11px;color:var(--td)}
.chain-b{padding:12px 16px}
.chip{display:inline-flex;align-items:center;gap:4px;background:var(--bg);border:1px solid var(--bd);padding:5px 12px;margin:3px;font-size:12px}
.chip .tk{color:var(--cu);font-family:'JetBrains Mono',monospace;font-weight:600;font-size:11px}

/* Filters */
.flt{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.flt label{font-size:10px;color:var(--td);text-transform:uppercase;letter-spacing:0.8px;font-weight:500}
select{background:var(--s);border:1px solid var(--bd);color:var(--t);padding:6px 12px;font-size:12px;font-family:'Outfit',sans-serif}
select:focus{outline:none;border-color:var(--cu)}
input[type=range]{-webkit-appearance:none;background:var(--bg3);height:3px;border-radius:2px;outline:none;width:100px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--cu);cursor:pointer;border:2px solid var(--s)}

/* Score dots */
.sc-dot{width:6px;height:6px;border-radius:50%;display:inline-block}

/* Signal grid */
.sig-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:24px}
@media(max-width:700px){.sig-row{grid-template-columns:1fr}}
.sig{background:var(--s);border:1px solid var(--bd);padding:16px;position:relative}
.sig .sl{font-size:10px;color:var(--td);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px;font-weight:500}
.sig .sv{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:600}
.sig .sd{font-size:11px;color:var(--tl);margin-top:6px;line-height:1.5}

/* EV cards */
.ev-row{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:20px}
.ev-card{background:var(--s);border:1px solid var(--bd);padding:18px;flex:1;min-width:200px}
.ev-card h4{color:var(--td);margin-bottom:6px;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;font-weight:500}
.ev-card .ev-val{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:600;margin-bottom:4px;letter-spacing:-0.5px}

/* Stagger entrance animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.kpi,.box,.sig,.tl-i,.chain,.ev-card{animation:fadeUp .4s ease both}
.kpi:nth-child(1){animation-delay:.05s}.kpi:nth-child(2){animation-delay:.1s}.kpi:nth-child(3){animation-delay:.15s}
.kpi:nth-child(4){animation-delay:.2s}.kpi:nth-child(5){animation-delay:.25s}.kpi:nth-child(6){animation-delay:.3s}
.kpi:nth-child(7){animation-delay:.35s}.kpi:nth-child(8){animation-delay:.4s}
.box:nth-child(2){animation-delay:.08s}.box:nth-child(3){animation-delay:.16s}
.box:nth-child(4){animation-delay:.24s}.box:nth-child(5){animation-delay:.32s}
.sig:nth-child(n+4){animation-delay:.15s}.sig:nth-child(n+7){animation-delay:.25s}
.tl-i:nth-child(n+3){animation-delay:.1s}.tl-i:nth-child(n+6){animation-delay:.2s}

/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--td)}
</style>
</head>

// ============ DOM HELPERS ============
function $(tag,at,ch){
  const e=document.createElement(tag);
  if(at)for(const[k,v]of Object.entries(at)){
    if(k==='text')e.textContent=v;else if(k==='cls')e.className=v;
    else if(k==='onclick')e.addEventListener('click',v);
    else if(k==='style')e.setAttribute('style',v);
    else e.setAttribute(k,v);
  }
  if(ch)(Array.isArray(ch)?ch:[ch]).forEach(c=>{if(typeof c==='string')e.appendChild(document.createTextNode(c));else if(c)e.appendChild(c)});
  return e;
}
function badge(t,c){return $('span',{cls:'b b'+c,text:t})}
function abadge(a){const m={strong:'g',moderate:'y',tactical:'b',hedge:'r'},l={strong:'Strong Bull',moderate:'Moderate',tactical:'Tactical',hedge:'Hedge'};return badge(l[a]||a,m[a]||'y')}
function rbadge(r){return badge(r.charAt(0).toUpperCase()+r.slice(1),{low:'g',medium:'y',high:'r'}[r])}
function actbadge(a){return badge(a,a.includes('BUY')||a==='LONG'?'g':a==='AVOID'?'r':a.includes('HOLD')?'y':'b')}
function levbar(v){const abs=Math.abs(v),col=v>=0?'var(--cu)':'var(--r)';
  return $('div',{cls:'bar-c'},[$('div',{cls:'bar'},[$('div',{cls:'bar-f',style:'width:'+abs+'%;background:'+col})]),$('div',{cls:'bar-v',text:v+'%'})])}
function scell(v){const c=v>=4?'var(--g)':v>=3?'var(--y)':v>=2?'var(--td)':'var(--r)';
  return $('td',{},[$('div',{cls:'sc-cell',style:'display:flex;align-items:center;gap:4px'},[$('span',{cls:'sc-dot',style:'background:'+c}),document.createTextNode(v)])])}
function pctSpan(v,inv){if(v==null)return $('span',{text:'--',style:'color:var(--td)'});
  const pos=inv?v<0:v>0;return $('span',{text:(v>0?'+':'')+v.toFixed(1)+'%',style:'font-family:JetBrains Mono,monospace;color:'+(pos?'var(--g)':'var(--r)')+';font-weight:600'})}

  const slRow=$('div',{cls:'flt',id:'sl-row'});
  Object.entries(SCEN).forEach(([k,s])=>{
    slRow.appendChild($('label',{text:s.nm+':'}));
    const sp=$('span',{id:'sp-'+k,text:scenProbs[k]+'%',style:'font-family:JetBrains Mono,monospace;color:var(--cu);font-weight:600;min-width:32px;display:inline-block'});
    const sl=$('input',{type:'range',min:'0',max:'100',value:String(scenProbs[k]),id:'sl-'+k});
    sl.addEventListener('input',()=>{scenProbs[k]=parseInt(sl.value);sp.textContent=scenProbs[k]+'%';rebuildEV()});
    slRow.appendChild(sl);slRow.appendChild(sp);
  });
  root.appendChild(slRow);
  root.appendChild($('div',{id:'ev-row',cls:'ev-row'}));
  root.appendChild($('div',{id:'sc-detail',cls:'box',style:'margin-bottom:16px'}));
  root.appendChild($('div',{id:'sc-tbl-wrap'}));
  rebuildScen();rebuildEV();
}
function rebuildScen(){
  const s=SCEN[curScen];const d=document.getElementById('sc-detail');if(!d)return;
  while(d.firstChild)d.removeChild(d.firstChild);
  d.appendChild($('h4',{text:s.nm+' \u2014 '+s.pr+' ('+s.pb+'% base probability)'}));
  d.appendChild($('p',{text:s.cond}));
  const w=document.getElementById('sc-tbl-wrap');if(!w)return;while(w.firstChild)w.removeChild(w.firstChild);
  const sorted=[...INV].sort((a,b)=>b.rt[curScen]-a.rt[curScen]);
  const t=$('table');const th=$('thead');const hr=$('tr');
  ['Ticker','Name','Type','Est. Return','Confidence','Rationale'].forEach(h=>hr.appendChild($('th',{text:h})));
  th.appendChild(hr);t.appendChild(th);
  const tb=$('tbody');
  sorted.forEach(i=>{
    const ret=i.rt[curScen];const tr=$('tr');
    tr.appendChild($('td',{},[$('strong',{text:i.tk,style:'font-family:JetBrains Mono,monospace;color:var(--cu)'})]));
    tr.appendChild($('td',{text:i.nm}));tr.appendChild($('td',{text:i.tp.replace(/-/g,' ')}));
    tr.appendChild($('td',{cls:ret>=0?'pnl-p':'pnl-n',text:(ret>=0?'+':'')+ret+'%'}));
    tr.appendChild($('td',{text:i.al==='strong'?'High':i.al==='moderate'?'Medium':'Low'}));
    tr.appendChild($('td',{text:i.kf,style:'font-size:12px;max-width:320px'}));tb.appendChild(tr)});
  t.appendChild(tb);w.appendChild(t);
}
function rebuildEV(){
  const evr=document.getElementById('ev-row');if(!evr)return;while(evr.firstChild)evr.removeChild(evr.firstChild);
  const total=scenProbs.bear+scenProbs.base+scenProbs.bull+scenProbs.superbull;
  const cuEV=(scenProbs.bear*9750+scenProbs.base*11250+scenProbs.bull*13000+scenProbs.superbull*15000)/total;
  const cuNow=getMkt('HG=F')&&getMkt('HG=F').price?Math.round(getMkt('HG=F').price*2204.62):12700;
  const cuUp=((cuEV-cuNow)/cuNow*100).toFixed(1);
  const evs=INV.map(i=>{const ev=(scenProbs.bear*i.rt.bear+scenProbs.base*i.rt.base+scenProbs.bull*i.rt.bull+scenProbs.superbull*i.rt.superbull)/total;return{...i,ev:Math.round(ev*10)/10}}).sort((a,b)=>b.ev-a.ev);

  const c1=$('div',{cls:'ev-card'});c1.appendChild($('h4',{text:'Expected Cu Price'}));
  c1.appendChild($('div',{cls:'ev-val',style:'color:var(--cu)',text:'$'+Math.round(cuEV).toLocaleString()+'/t'}));
  c1.appendChild($('div',{cls:'d',text:'vs current ~$'+cuNow.toLocaleString()+' = '+cuUp+'% implied'}));
  evr.appendChild(c1);

  const c2=$('div',{cls:'ev-card'});c2.appendChild($('h4',{text:'Best EV: '+evs[0].tk}));
  c2.appendChild($('div',{cls:'ev-val',style:'color:var(--g)',text:'+'+evs[0].ev+'%'}));
  c2.appendChild($('div',{cls:'d',text:evs[0].nm}));evr.appendChild(c2);

  const c3=$('div',{cls:'ev-card'});c3.appendChild($('h4',{text:'2nd: '+evs[1].tk+' | 3rd: '+evs[2].tk}));
  c3.appendChild($('div',{cls:'ev-val',style:'color:var(--g)',text:'+'+evs[1].ev+'% | +'+evs[2].ev+'%'}));
  c3.appendChild($('div',{cls:'d',text:'Probability-weighted expected returns'}));evr.appendChild(c3);

  const c4=$('div',{cls:'ev-card'});c4.appendChild($('h4',{text:'Prob Sanity Check'}));
  const ok=Math.abs(total-100)<1;
  c4.appendChild($('div',{cls:'ev-val',style:'color:'+(ok?'var(--g)':'var(--r)'),text:total+'%'}));
  c4.appendChild($('div',{cls:'d',text:ok?'Probabilities sum to ~100%':'Adjust sliders to sum to 100%'}));evr.appendChild(c4);
}

function updateHeader(){
  const cu=getMkt('HG=F');
  if(cu&&cu.price){
    document.getElementById('cu-price').textContent='$'+cu.price.toFixed(3);
    const chEl=document.getElementById('cu-change');
    if(cu.change_pct!=null){
      chEl.textContent=(cu.change_pct>=0?'+':'')+cu.change_pct.toFixed(2)+'%';
      chEl.style.background=cu.change_pct>=0?'var(--gd)':'var(--rd)';
      chEl.style.color=cu.change_pct>=0?'var(--g)':'var(--r)';
    }
  }
  if(mktData&&mktData.updated)document.getElementById('data-ts').textContent='Data: '+mktData.updated;
}

async function loadData(){
  try{
    const resp=await fetch('market_data.json');
    if(resp.ok){mktData=await resp.json();updateHeader()}
  }catch(e){
    try{
      const xhr=new XMLHttpRequest();
      xhr.open('GET','market_data.json',false);
      xhr.send();
      if(xhr.status===200||xhr.status===0){mktData=JSON.parse(xhr.responseText);updateHeader()}
    }catch(e2){
      if(typeof INLINE_DATA!=='undefined'){mktData=INLINE_DATA;updateHeader()}
      else{console.log('No market data. Run: uv run --python 3.12 --with yfinance python fetch_data.py')}
    }
  }
  buildTabs();showPanel('dashboard');
}
loadData();
